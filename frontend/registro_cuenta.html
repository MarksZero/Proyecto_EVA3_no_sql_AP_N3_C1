<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Cuenta Bancaria</title>

    <link rel="stylesheet" href="./css/brite.css">
    <link rel="stylesheet" href="./css/estilos.css">
</head>

<body>

   <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="light">
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a href="./inicio.html" class="nav-link">Inicio</a></li>
                <li class="nav-item"><a href="./formulario.html" class="nav-link">Formulario de Registro</a></li>
                <li class="nav-item"><a href="./cuentas_bancarias.html" class="nav-link">Ver Cuentas Bancarias</a> </li>
                                <li class="nav-item"><a href="./registro_cuenta.html" class="nav-link">Registrar Cuenta Bancaria </a> </li>

            </ul>
        </div>
    </nav>

<main class="container principal">

    <h2 class="mb-4">Registro de Cuenta Bancaria</h2>

    <form id="registroCuentaBancaria">

        <h5>Datos de la Cuenta</h5>
        <hr>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="selectUsuario" class="form-label">Usuario:</label>
                <select class="form-select" id="selectUsuario" required>
                    <option value="">Seleccione un usuario</option>
                </select>
            </div>

            <div class="col-md-6">
                <label for="inputBanco" class="form-label">Banco:</label>
                <input type="text" class="form-control" id="inputBanco" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="selectTipoCuenta" class="form-label">Tipo de Cuenta:</label>
                <select class="form-select" id="selectTipoCuenta" required>
                    <option value="">Seleccione tipo de cuenta</option>
                    <option value="Cuenta Corriente">Cuenta Corriente</option>
                    <option value="Cuenta Vista">Cuenta Vista</option>
                    <option value="Cuenta de Ahorro">Cuenta de Ahorro</option>
                    <option value="Cuenta RUT">Cuenta RUT</option>
                </select>
            </div>

            <div class="col-md-6">
                <label for="inputNumeroCuenta" class="form-label">Número de Cuenta:</label>
                <input type="text" class="form-control" id="inputNumeroCuenta" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label for="inputMoneda" class="form-label">Moneda:</label>
                <input type="text" class="form-control" id="inputMoneda" value="CLP" required>
            </div>

            <div class="col-md-4">
                <label for="inputSaldo" class="form-label">Saldo:</label>
                <input type="number" class="form-control" id="inputSaldo" min="0" required>
            </div>

            <div class="col-md-4">
                <label for="inputFechaApertura" class="form-label">Fecha Apertura:</label>
                <input type="date" class="form-control" id="inputFechaApertura" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label for="selectEstado" class="form-label">Estado:</label>
                <select class="form-select" id="selectEstado" required>
                    <option value="Activa">Activa</option>
                    <option value="Inactiva">Inactiva</option>
                    <option value="Bloqueada">Bloqueada</option>
                    <option value="Cerrada">Cerrada</option>
                </select>
            </div>

            <div class="col-md-4">
                <label for="inputSucursal" class="form-label">Sucursal:</label>
                <input type="text" class="form-control" id="inputSucursal">
            </div>

            <div class="col-md-4">
                <label for="inputTitular" class="form-label">Titular:</label>
                <input type="text" class="form-control" id="inputTitular" required>
            </div>
        </div>

        <div class="text-end mt-4">
            <a href="./inicio.html" class="btn btn-secondary">Cancelar</a>
            <button type="button" class="btn btn-primary" onclick="guardarCuentaBancaria()">Guardar Cuenta</button>
        </div>

    </form>

</main>

<script src="./scripts/ap_n3_c1.js"></script>

</body>
</html>
